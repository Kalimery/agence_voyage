<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Réservation - Agence de Voyage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/api.js') }}" defer></script>
</head>
<body>
<header>
    <h1>Réservation</h1>
</header>

<main>
    <div id="selectedDestination"></div>
    <h2>Hôtels disponibles</h2>
    <div id="hotelsContainer"></div>
</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const client = JSON.parse(localStorage.getItem("client"));
    if (!client) {
        alert("Veuillez vous connecter d'abord.");
        window.location.href = "login.html";
        return;
    }

    const destination = JSON.parse(localStorage.getItem("selectedDestination"));
    if (!destination) {
        alert("Veuillez sélectionner une destination d'abord.");
        window.location.href = "destination.html";
        return;
    }

    document.getElementById("selectedDestination").innerHTML = `
        <h2>${destination.name} - ${destination.price} MAD</h2>
    `;

    try {
        const hotels = await getHotels(destination.id);
        const hotelsContainer = document.getElementById("hotelsContainer");

        hotels.forEach(h => {
            hotelsContainer.innerHTML += `
                <div class="card">
                    <h3>${h.nom_hotel} (${h.categorie})</h3>
                    <p>${h.adresse}</p>
                    <p>Prix/nuit: ${h.prix_nuit} MAD</p>
                    <button onclick="bookHotel(${h.id_hotel}, '${h.nom_hotel}', ${h.prix_nuit})">Réserver</button>
                </div>
            `;
        });
    } catch(err) {
        console.error(err);
        document.getElementById("hotelsContainer").innerHTML = "<p>Impossible de charger les hôtels.</p>";
    }
});

function bookHotel(id_hotel, nom_hotel, prix_nuit) {
    localStorage.setItem("selectedHotel", JSON.stringify({id_hotel, nom_hotel, prix_nuit}));
    alert(`Vous avez sélectionné l'hôtel ${nom_hotel}.`);
    window.location.href = "payment.html"; // Or any page you use for final reservation/payment
}
</script>
</body>
</html>
